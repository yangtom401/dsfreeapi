name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: web/.bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: web
      - name: Type check
        run: bun run typecheck
        working-directory: web
      - name: Build frontend
        run: bun run build
        working-directory: web
      - name: Lint frontend
        run: bun run lint
        working-directory: web
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist/
          if-no-files-found: error

  check:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy,rustfmt
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libclang-dev
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo audit
        uses: actions-rust-lang/audit@v1
        with:
          args: --deny warnings
      - name: cargo machete
        run: command -v cargo-machete || cargo install cargo-machete --locked && cargo machete
      - name: cargo outdated
        run: command -v cargo-outdated || cargo install cargo-outdated --locked && cargo outdated --exit-code 1 --root-deps-only
  test:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download frontend assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web/dist/
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake g++ libclang-dev
      - name: cargo test
        run: cargo test
